# ------------------------
# Cloudflare 터널 전용 Real IP 설정
# ------------------------
# 외부망 IP가 아닌, cloudflared 컨테이너가 사용하는 Docker 내부망 대역을 신뢰
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# Cloudflare가 전달하는 실제 유저 IP 헤더
real_ip_header CF-Connecting-IP;

server {
    listen 80;

    # 클라이언트 요청 크기 제한
    client_max_body_size 100M;

    # ------------------------
    # 공통 Proxy 헤더 설정
    # ------------------------
    # Nginx는 80번 포트로 받지만, 백엔드(Spring Boot)에게는 사용자가 원래 'https'로 접속했다고 강제로 알려주어 Mixed Content 에러를 방지
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # 프론트엔드 정적 파일
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API (인증, 일기, 사진 보호 라우트 포함)
    location /api {
        proxy_pass http://backend:8080;
    }

    # 사진 보호 라우트: Vite proxy의 rewrite(/photos → /api/photos)와 동일하게 처리
    location /photos {
        rewrite ^/photos(.*)$ /api/photos$1 break;
        proxy_pass http://backend:8080;
    }

    # X-Accel-Redirect 내부 전달 위치
    # Spring이 X-Accel-Redirect: /internal/diary/... 헤더를 반환하면
    # Nginx가 /data/uploads/diary/... 파일을 클라이언트에 직접 전송합니다.
    # external 요청으로는 절대 접근할 수 없습니다 (internal 지시어).
    location /internal/ {
        internal;
        alias /data/uploads/;
    }
}
